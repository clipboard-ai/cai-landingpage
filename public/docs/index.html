<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cai — Documentation</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="description"
      content="Cai Documentation - AI-powered clipboard for macOS"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <!-- Google Fonts: match landing page -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=General+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        basePath: '/docs/',
        loadSidebar: true,
        alias: {
          '/.*/_sidebar.md': '/_sidebar.md',
        },
        subMaxLevel: 2,
        name: '',
        nameLink: '/',
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "Search docs...",
          noData: "No Results!",
          depth: 3,
          namespace: "cai-docs",
        },
        auto2top: true,
        noEmoji: true,
      };
    </script>
    <!-- Docsify v4 -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <!-- Search Plugin -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <!-- Customizations: favicon, title, Download CTA -->
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        // Force favicon (docsify can override it)
        var link = document.querySelector("link[rel*='icon']");
        if (link) link.href = '/images/favicon.ico';

        // Force tab title on every route change
        var fixTitle = function () { document.title = 'Cai — Documentation'; };
        fixTitle();
        window.addEventListener('hashchange', function () { setTimeout(fixTitle, 50); });

        // Inject sidebar header (split logo + docs link) and Download CTA
        var observer = new MutationObserver(function () {
          var sidebar = document.querySelector('.sidebar');
          if (sidebar && !sidebar.querySelector('.sidebar-header')) {
            // Replace empty app-name with split links
            var nameLink = sidebar.querySelector('.app-name-link');
            var header = document.createElement('div');
            header.className = 'sidebar-header';
            header.innerHTML =
              '<a href="/" class="sidebar-logo-link"><img src="/docs/cai-logo.png" alt="Cai" class="app-logo"></a>' +
              '<a href="#/" class="sidebar-docs-link">Docs</a>';
            if (nameLink) {
              nameLink.replaceWith(header);
            } else {
              sidebar.prepend(header);
            }

            // Download CTA
            var cta = document.createElement('a');
            cta.href = 'https://github.com/clipboard-ai/cai/releases/latest';
            cta.target = '_blank';
            cta.rel = 'noopener noreferrer';
            cta.className = 'sidebar-cta';
            cta.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512" fill="currentColor" width="14" height="14"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg> Download for Mac';
            sidebar.appendChild(cta);
            observer.disconnect();
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });
      });
    </script>
  </body>
</html>
